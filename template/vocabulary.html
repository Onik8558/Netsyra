<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vocabulary</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f7f7f8;
}

/* ===== Remove focus rings everywhere ===== */
*:focus,
*:focus-visible,
*:active {
  outline: none !important;
  box-shadow: none !important;
}

/* ===== Disable blue highlight on mobile ===== */
* {
  -webkit-tap-highlight-color: transparent;
}

/* ===== Disable text selection (optional but clean UX) ===== */
body {
  -webkit-user-select: none;
  -ms-user-select: none;
  user-select: none;
}

/* ===== Top Bar ===== */
.top-bar{
  border-bottom:3px solid #10a37f;
  padding:14px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  background:#ffffff;
}

/* ===== Grid ===== */
.vocab-grid{
  padding:16px;
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
}

/* ===== Word Cards ===== */
.word-card{
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:18px 10px;
  text-align:center;
  font-size:16px;
  font-weight:500;
  color:#111827;
  cursor:pointer;
  transition:transform 0.15s ease, box-shadow 0.15s ease;
}

.word-card:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

/* ===== More Advanced Button ===== */
.more-btn-wrap{
  padding:24px;
  text-align:center;
}

.more-btn{
  background:#10a37f;
  color:#ffffff;
  border:none;
  padding:14px 26px;
  font-size:16px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  box-shadow:0 6px 14px rgba(16,163,127,0.35);
}

.more-btn:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="top-bar">Vocabulary</div>

<div class="vocab-grid" id="grid"></div>

<div class="more-btn-wrap" id="moreWrap">
  <button class="more-btn" onclick="loadAdvanced()">More Advanced</button>
</div>

<script>
/* ===== Basic Vocabulary (300 words) ===== */
const basicWords = [
"the","be","to","of","and","a","in","that","have","I",
"it","for","not","on","with","he","as","you","do","at",
"this","but","his","by","from","they","we","say","her","she",
"or","an","will","my","one","all","would","there","their","is",
"are","was","were","been","being","can","could","may","might","must",
"shall","should","what","which","who","when","where","why","how","make",
"know","think","take","see","come","want","use","find","give","tell",
"work","seem","feel","try","leave","call","good","new","first","last"
];

while(basicWords.length < 300){
  basicWords.push(...basicWords.slice(0, 300 - basicWords.length));
}

/* ===== Advanced Vocabulary (50 words) ===== */
const advancedWords = [
"abundant","meticulous","contemplate","intricate","resilient",
"inevitable","substantial","perception","articulate","phenomenon",
"hypothesis","transcend","autonomous","coherent","versatile",
"pragmatic","sophisticated","paradox","consequence","ambiguous",
"insightful","diligent","cognitive","ethical","subtle",
"refine","strategic","persistent","dynamic","innovative",
"constructive","adaptation","formidable","plausible","significant",
"prioritize","allocate","integrity","cohesive","robust",
"optimize","evaluate","sustain","framework","dimension"
];

const grid = document.getElementById("grid");
const moreWrap = document.getElementById("moreWrap");

/* ===== Render Basic ===== */
basicWords.forEach(word => addWord(word));

/* ===== Add Word Card ===== */
function addWord(word){
  const div = document.createElement("div");
  div.className = "word-card";
  div.textContent = word;
  div.onclick = () => speak(word);
  grid.appendChild(div);
}

/* ===== Load Advanced ===== */
function loadAdvanced(){
  advancedWords.forEach(word => addWord(word));
  moreWrap.style.display = "none"; // hide button after click
}

/* ===== Deep Grave Voice TTS ===== */
function speak(text){
  if(!('speechSynthesis' in window)) return;

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = 0.82;
  utter.pitch = 0.6;
  utter.volume = 1.0;

  const voices = speechSynthesis.getVoices();
  utter.voice =
    voices.find(v =>
      v.lang === "en-US" &&
      (v.name.toLowerCase().includes("male") ||
       v.name.toLowerCase().includes("google") ||
       v.name.toLowerCase().includes("david"))
    ) || voices.find(v => v.lang === "en-US") || voices[0];

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
