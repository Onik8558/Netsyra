<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ Responsive viewport (no mobile lock) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Splash - Netsyra</title>

  <style>
    /* ================= RESET ================= */
    * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      outline: none;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    *:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ================= LOGO ================= */
    img {
      width: clamp(160px, 22vw, 360px);
      height: auto;
      opacity: 0;
      transform: scale(0.85);
      filter: blur(18px);
      animation: fadeZoomBlur 6s ease forwards;
      will-change: transform, opacity, filter;
    }

    /* ================= ANIMATION ================= */
    @keyframes fadeZoomBlur {
      0% {
        opacity: 0;
        transform: scale(0.8);
        filter: blur(20px);
      }
      50% {
        opacity: 0.65;
        transform: scale(0.92);
        filter: blur(6px);
      }
      100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
      }
    }

    /* ================= DESKTOP POLISH ================= */
    @media (min-width: 1024px) {
      img {
        filter: drop-shadow(0 0 40px rgba(255,255,255,0.12));
      }
    }

    /* ================= LARGE SCREENS ================= */
    @media (min-width: 1440px) {
      img {
        width: clamp(260px, 18vw, 420px);
      }
    }
  </style>

  <script>
    // ✅ Splash duration (matches animation)
    setTimeout(() => {
      window.location.href = "/home";
    }, 6000);
  </script>
</head>

<body>
  <img src="{{ url_for('static', filename='netsy_logo.jpg') }}" alt="Netsyra Logo">
</body>
</html>
