<script>  
/* ---------------------------  
   Element references & state  
----------------------------*/  
const input = document.getElementById("userInput");

const colorBoxes = bgPopup.querySelectorAll(".color-box");  let currentChat = [];
let chatHistory = [];



/* ---------------------------
Utility: escape HTML (safe insertion)
----------------------------*/
function escapeHtml(unsafe){
  return unsafe
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function renderMarkdown(text) {
  // Escape HTML first
  text = text.replace(/&/g,"&amp;")
             .replace(/</g,"&lt;")
             .replace(/>/g,"&gt;")
             .replace(/"/g,"&quot;")
             .replace(/'/g,"&#039;");

  // ✅ NEW: Divider (--- → <hr>)
  text = text.replace(/^---$/gm, '<hr>');

  // Headings: ### H3
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  // Headings: ## H2
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');

  // Bold **text**
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Bullets: - item or * item
  let lines = text.split('\n');
  let inList = false;
  let result = '';
  lines.forEach(line => {
    if (/^(\s*[-*]\s+)/.test(line)) {
      if (!inList) { result += '<ul>'; inList = true; }
      result += '<li>' + line.replace(/^(\s*[-*]\s+)/,'') + '</li>';
    } else {
      if (inList) { result += '</ul>'; inList = false; }
      result += line + '<br>';
    }
  });
  if (inList) result += '</ul>';

  return result;
}

/* ---------------------------
Append messages helpers
----------------------------*/
function appendMessage(sender, text){
  const d = document.createElement("div");
  d.className = `message ${sender}`;
  const span = document.createElement("span");

  if(sender === "bot"){

    // ✅ Step 1: Render markdown first
    let html = renderMarkdown(text);

    // ✅ Step 2: Replace code blocks AFTER markdown
    html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
      return `<div class="code-bubble"><pre><code>${escapeHtml(code.trim())}</code></pre></div>`;
    });

    span.innerHTML = html;

  } else {
    span.innerHTML = escapeHtml(text);
  }

  d.appendChild(span);
  chatContainer.appendChild(d);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function addUserMessage(text){
  appendMessage("user", text);
  currentChat.push({sender:"user", text});
  saveTempHistory();
}

function addBotMessage(text){
  appendMessage("bot", text);
  currentChat.push({sender:"bot", text});
  saveTempHistory();
}

/* ---------------------------
Typing animation (bouncing dots)
Returns an object { intervalId, node } to stop
----------------------------*/
function showBouncingTyping(){
// Build bubble
const wrapper = document.createElement("div");
wrapper.className = "typing-bubble";
wrapper.id = "typingBubble";

const bubble = document.createElement("div");
bubble.className = "bubble";

const label = document.createElement("span");
label.textContent = "Thinking for response";
bubble.appendChild(label);

const dots = document.createElement("div");
dots.className = "dots";
// create three dots
for(let i=0;i<3;i++){
const dot = document.createElement("div");
dot.className = "dot";
dots.appendChild(dot);
}
bubble.appendChild(dots);
wrapper.appendChild(bubble);
chatContainer.appendChild(wrapper);
chatContainer.scrollTop = chatContainer.scrollHeight;

// animate by toggling .bounce class in sequence
const dotNodes = dots.querySelectorAll(".dot");
let idx = 0;
const intervalId = setInterval(()=>{
dotNodes.forEach(n => n.classList.remove("bounce"));
dotNodes[idx].classList.add("bounce");
idx = (idx + 1) % dotNodes.length;
}, 240);

return { intervalId, node: wrapper };
}

function hideBouncingTyping(handle){
if(!handle) return;
clearInterval(handle.intervalId);
if(handle.node && handle.node.parentNode) handle.node.remove();
}

/* ---------------------------
Smooth character-by-character typing for bot reply
----------------------------*/
function typeBotReply(finalText, speed = 18) {
  const d = document.createElement("div");
  d.className = "message bot";

  const span = document.createElement("span");
  d.appendChild(span);

  chatContainer.appendChild(d);
  chatContainer.scrollTop = chatContainer.scrollHeight;

  let i = 0;

  function step() {
    if (i < finalText.length) {
      span.textContent += finalText.charAt(i);
      i++;
      chatContainer.scrollTop = chatContainer.scrollHeight;
      setTimeout(step, speed);
    } else {
      // ✅ FIX: pass MESSAGE div, not span
      addActions(d, finalText);
    }
  }

  step();
}


/* ---------------------------
Send message flow (single place)
----------------------------*/
function addActions(msgDiv, text){
  const actions = document.createElement("div");
  actions.className = "bot-actions";

  // COPY
  const copyBtn = document.createElement("button");
  copyBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <rect x="9" y="9" width="13" height="13" rx="2"></rect>
      <rect x="2" y="2" width="13" height="13" rx="2"></rect>
    </svg>`;
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text);
  };

  // SHARE
  const shareBtn = document.createElement("button");
  shareBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/>
      <path d="M12 3v12"/>
      <path d="M7 8l5-5 5 5"/>
    </svg>`;
  shareBtn.onclick = () => {
    if(navigator.share){
      navigator.share({ text });
    }
  };

  // EXPORT / DOWNLOAD
  const downloadBtn = document.createElement("button");
  downloadBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M12 3v12"/>
      <path d="M7 10l5 5 5-5"/>
      <path d="M5 21h14"/>
    </svg>`;
  downloadBtn.onclick = () => {
    const blob = new Blob([text], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "chat.txt";
    a.click();
  };

  // SPEAK
  const speakBtn = document.createElement("button");
  speakBtn.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
      <path d="M11 5L6 9H2v6h4l5 4z"/>
      <path d="M15.5 8.5a5 5 0 0 1 0 7"/>
      <path d="M19 5a9 9 0 0 1 0 14"/>
    </svg>`;
  speakBtn.onclick = () => {
    const utter = new SpeechSynthesisUtterance(text);
    speechSynthesis.speak(utter);
  };

  actions.append(copyBtn, shareBtn, downloadBtn, speakBtn);
  msgDiv.appendChild(actions);
}

function sendMessage() {
  const msg = input.value.trim();
  if (!msg) return;

  // Animate plane
  sendBtn.classList.add("animate");
  setTimeout(() => sendBtn.classList.remove("animate"), 300);

  // Show user message
  addUserMessage(msg);

  // Clear input
  input.value = "";
  input.style.height = "45px";

  // Show typing animation
  const typingHandle = showBouncingTyping();

  // Simulate thinking delay (short + proportional to length)
  const baseDelay = 800; // minimum delay
  const perChar = 12;
