<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<style>
/* ===== General Body ===== */
body {
    font-family: 'Segoe UI', Roboto, sans-serif;
    margin: 0;
    padding: 0;
    background: #0f172a;
    color: #fff;
    line-height: 1.7;
    overflow-x: hidden;
}

.read-content {
    max-width: 900px;
    margin: 120px auto 60px auto; /* leave space for top bar */
    padding: 0 24px;
}

/* ===== Top Bar ===== */
.top-bar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    backdrop-filter: blur(18px);
    background: rgba(20,20,40,0.6);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    z-index: 1000;
    transition: transform 0.25s ease, opacity 0.25s ease;
    opacity: 0; /* initially hidden */
}

/* ===== Remove Browser Focus Ring Completely ===== */

/* Target all interactive elements */
button,
input,
textarea,
select,
a {
  outline: none !important;       /* Remove the outline */
  box-shadow: none !important;    /* Remove any shadow */
}

/* Also remove focus ring for keyboard navigation in modern browsers */
:focus-visible {
  outline: none !important;
  box-shadow: none !important;
}

/* Optional: remove active ring for buttons on click (mobile/touch) */
button:active,
a:active {
  outline: none !important;
  box-shadow: none !important;
}

/* Optional: ensure no outline for divs with tabindex (rare but possible) */
div[tabindex] {
  outline: none !important;
}

/* ===== Buttons in Top Bar ===== */
.top-bar button {
    border: none;
    cursor: pointer;
    border-radius: 999px;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

#backBtn {
    background: linear-gradient(135deg,#ff5f6d,#ffc371);
    color: #fff;
    padding: 10px 18px;
    font-size: 16px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}
#backBtn:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 25px rgba(0,0,0,0.5);
}

#speakerBtn {
    background: linear-gradient(135deg,#1a73e8,#60a5fa);
    color: #fff;
    width: 60px;
    height: 60px;
    font-size: 28px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
#speakerBtn:hover {
    transform: scale(1.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

.zoom-btn {
    background: linear-gradient(135deg,#34d399,#10b981);
    color: #fff;
    width: 50px;
    height: 50px;
    font-size: 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.zoom-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 15px 35px rgba(0,0,0,0.6);
}

/* ===== Header Title (optional) ===== */
.top-bar h2 {
    flex: 1;
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
}

/* ===== Smooth Transition for Top Bar ===== */
.top-bar.show {
    opacity: 1;
}

/* ===== Novel Text ===== */
.read-content p {
    margin-bottom: 1.2em;
}

/* ===== Footer spacing ===== */
.footer-space { height: 40px; }
</style>
</head>

<body>

<div class="top-bar" id="topBar">
    <button id="backBtn" onclick="history.back()">← Back</button>
    <button id="speakerBtn">🔊</button>
    <button class="zoom-btn" id="zoomIn">+</button>
    <button class="zoom-btn" id="zoomOut">−</button>
</div>

<h1 style="text-align:center; margin-top:90px;">{{ title }}</h1>
<div class="read-content" id="novelContent">
    {{ content | safe }}
</div>

<div class="footer-space"></div>

<script>
const topBar = document.getElementById("topBar");
const speakerBtn = document.getElementById("speakerBtn");
const contentDiv = document.getElementById("novelContent");
let hideTimeout;
let speaking = false;
let utterance = null;

// ===== Show Top Bar on scroll, touch, click =====
function showTopBar() {
    topBar.classList.add("show");
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(() => {
        topBar.classList.remove("show");
    }, 3000); // hide after 3 seconds
}

contentDiv.addEventListener("scroll", showTopBar);
contentDiv.addEventListener("click", showTopBar);
window.addEventListener("scroll", showTopBar);
window.addEventListener("touchstart", showTopBar);

// ===== Speaker Function =====
speakerBtn.addEventListener("click", () => {
    if(speaking){
        speechSynthesis.cancel();
        speaking = false;
        return;
    }
    const text = contentDiv.innerText;
    if(!text) return;

    utterance = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();
    utterance.voice = voices.find(v=>v.name.toLowerCase().includes("female")) || voices.find(v=>v.lang.startsWith("en"));
    utterance.rate = 0.9;
    utterance.pitch = 1.2;
    speaking = true;
    speechSynthesis.speak(utterance);
    utterance.onend = () => speaking = false;
});

// ===== Zoom Functions =====
const zoomInBtn = document.getElementById("zoomIn");
const zoomOutBtn = document.getElementById("zoomOut");

let currentFontSize = 16; // base font-size in px

zoomInBtn.addEventListener("click", () => {
    currentFontSize += 2;
    contentDiv.style.fontSize = currentFontSize + "px";
});
zoomOutBtn.addEventListener("click", () => {
    if(currentFontSize > 10){
        currentFontSize -= 2;
        contentDiv.style.fontSize = currentFontSize + "px";
    }
});
</script>

</body>
</html>
