<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Professional Notes Editor</title>
<style>
 /* Remove ALL focus rings everywhere */    
*:focus,    
*:focus-visible,    
*:focus-within {    
    outline: none !important;    
    box-shadow: none !important;    
}  /* Remove focus border on inputs & textarea */  
input:focus,  
textarea:focus,  
button:focus {  
outline: none !important;  
box-shadow: none !important;  
border: none !important;  
}  
  
/* Remove Chrome/Android blue highlight */  
input,  
textarea,  
button,  
select {  
-webkit-focus-ring-color: transparent;  
}  
  
/* Remove tap highlight on mobile */  
  
* {  
  -webkit-tap-highlight-color: transparent;  
}  

/* ===== RESET ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,Inter,monospace;}
body{background:#f7f8fb;height:100vh;overflow:hidden;}

/* ===== EDITOR SHELL ===== */
.editor-shell{
  display:flex;
  height:100vh;
  padding:80px 16px 120px;
  overflow:hidden;
  background:#fff;
}

/* ===== LINE NUMBERS ===== */
#lineNumbers{
  width:40px;
  text-align:right;
  padding-right:10px;
  color:#999;
  user-select:none;
  font-size:16px;
  line-height:1.6;
  overflow:hidden;
}

/* ===== EDITOR AREA ===== */
#editorArea{
  flex:1;
  outline:none;
  font-size:16px;
  line-height:1.6;
  overflow:auto;
  white-space:pre-wrap;
  padding-left:10px;
}

/* ===== SYNTAX COLORS ===== */
.keyword{color:#7c4dff;}
.string{color:#00a67d;}
.number{color:#ff6b6b;}
.comment{color:#999;}
.highlight{background:yellow;}

/* ===== FIND BAR ===== */
.find-bar{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  border-radius:12px;
  padding:8px 12px;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
  display:none;
  z-index:1500;
}

/* ===== FLOATING HAMBURGER ===== */
.floating-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:48px;
  height:48px;
  border-radius:50%;
  backdrop-filter: blur(16px);
  background: rgba(255,255,255,.35);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
  cursor:pointer;
}
.floating-btn svg{width:22px;height:22px;}

/* Hamburger Menu Popup */
.menu-popup{
  position:fixed;
  top:76px;
  right:20px;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(16px);
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:1999;
}
.menu-popup button{
  border:none;
  background:none;
  padding:14px 18px;
  font-size:15px;
  cursor:pointer;
  text-align:left;
}
.menu-popup button:hover{background: rgba(0,0,0,.06);}

/* ===== BOTTOM CANVA BAR (SCROLLABLE) ===== */
.canva-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  display:flex;
  gap:10px;
  padding:10px;
  align-items:center;
  box-shadow:0 -8px 20px rgba(0,0,0,.1);
  z-index:1000;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  -webkit-overflow-scrolling: touch;
}
.canva-bar::-webkit-scrollbar{display:none;}
.canva-bar button,input{flex:0 0 auto;cursor:pointer;border-radius:8px;border:none;padding:6px 10px;font-size:15px;background:#f1f2f6;}

/* ===== SELECTED TEXT ===== */
::selection{background:#cce6ff;color:#000;}
</style>
</head>
<body>

<!-- Floating Hamburger -->
<div class="floating-btn" id="menuBtn" title="Menu">
  <svg viewBox="0 0 24 24" fill="black">
    <circle cx="12" cy="5" r="2"/>
    <circle cx="12" cy="12" r="2"/>
    <circle cx="12" cy="19" r="2"/>
  </svg>
</div>

<!-- Hamburger Menu -->
<div class="menu-popup" id="menu">
  <button onclick="saveFile()">💾 Save</button>
  <button onclick="openFile()">📂 Open</button>
  <button onclick="newFile()">🆕 New</button>
</div>

<!-- Editor Shell -->
<div class="editor-shell">
  <div id="lineNumbers"></div>
  <div id="editorArea" contenteditable="true" spellcheck="false"></div>
</div>

<!-- Find Bar -->
<div class="find-bar" id="findBar">
  <input id="findInput" placeholder="Find..." />
</div>

<!-- Bottom Canva Bar -->
<div class="canva-bar">
  <button onclick="format('bold')" title="Bold"><b>B</b></button>
  <button onclick="format('removeFormat')" title="Thin">T</button>
  <button onclick="align('left')" title="Left">⬅</button>
  <button onclick="align('center')" title="Center">⬍</button>
  <button onclick="align('right')" title="Right">➡</button>
  <input type="color" onchange="setColor(this.value)" title="Text Color">
  <input type="number" min="10" max="48" value="16" onchange="setFontSize(this.value)" title="Font Size">
  <button onclick="exportTXT()">TXT</button>
  <button onclick="exportMD()">MD</button>
  <button onclick="exportPDF()">PDF</button>
  <button onclick="undo()" title="Undo">↩</button>
  <button onclick="redo()" title="Redo">↪</button>
  <button onclick="toggleFind()" title="Find">🔍</button>
</div>

<script>
// ===== ELEMENTS =====
const editor = document.getElementById('editorArea');
const lines = document.getElementById('lineNumbers');
const menuBtn = document.getElementById('menuBtn');
const menu = document.getElementById('menu');
const findBar = document.getElementById('findBar');
const findInput = document.getElementById('findInput');

let docs=[{undo:[],redo:[]}], docIndex=0;
let raf=false;
let fontSize=16;

// ===== HAMBURGER MENU =====
menuBtn.onclick = e=>{
  menu.style.display = menu.style.display==='flex'?'none':'flex';
  e.stopPropagation();
};
document.addEventListener('click',()=> menu.style.display='none');

// ===== LINE NUMBERS =====
function updateLines(){
  if(raf) return;
  raf=true;
  requestAnimationFrame(()=>{
    const count = editor.innerText.split('\n').length;
    let html='';
    for(let i=1;i<=count;i++) html+=i+'<br>';
    lines.innerHTML = html;
    lines.scrollTop = editor.scrollTop;
    raf=false;
  });
}
editor.addEventListener('input', updateLines);
editor.addEventListener('scroll', ()=> lines.scrollTop = editor.scrollTop);
updateLines();

// ===== FORMAT FUNCTIONS =====
function format(cmd){document.execCommand(cmd,false,null);}
function align(type){document.execCommand(type==='left'?'justifyLeft':type==='center'?'justifyCenter':'justifyRight');}

// ===== PROFESSIONAL STYLE FUNCTIONS =====
function applyStyle(style){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if(style==='bold'){
    document.execCommand('bold');
  } else if(style==='thin'){
    wrapSelectionWithStyle('font-weight','normal');
  }
}

function applyColor(color){
  wrapSelectionWithStyle('color', color);
}

function applyFontSize(size){
  wrapSelectionWithStyle('font-size', size+'px');
}

// Helper function to wrap selected text
function wrapSelectionWithStyle(property, value){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);

  if(range.collapsed) return;

  const span = document.createElement('span');
  span.style[property] = value;

  range.surroundContents(span);
  sel.removeAllRanges();
  sel.addRange(range);
}

// ===== FILE HANDLERS =====
function saveFile(){
  const text = editor.innerHTML;
  const blob = new Blob([text],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'note.html';
  a.click();
  menu.style.display='none';
}
function openFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.txt,.html,.md';
  input.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{editor.innerHTML=r.result; updateLines();}
    r.readAsText(f);
  };
  input.click(); menu.style.display='none';
}
function newFile(){
  if(editor.innerText.trim() && !confirm('Clear current note?')) return;
  editor.innerHTML=''; updateLines(); menu.style.display='none';
}

// ===== UNDO/REDO =====
editor.addEventListener('input',()=>{docs[docIndex].undo.push(editor.innerHTML); docs[docIndex].redo=[];});
function undo(){const u=docs[docIndex].undo; if(u.length){docs[docIndex].redo.push(editor.innerHTML); editor.innerHTML=u.pop(); updateLines();}}
function redo(){const r=docs[docIndex].redo; if(r.length){docs[docIndex].undo.push(editor.innerHTML); editor.innerHTML=r.pop(); updateLines();}}

// ===== FIND =====
function toggleFind(){findBar.style.display=findBar.style.display?'':'block'; findInput.focus();}
findInput.oninput=()=>{const q=findInput.value; const re=new RegExp(q,'gi'); editor.innerHTML = editor.innerHTML.replace(re,m=>`<span class="highlight">${m}</span>`);}

// ===== EXPORT =====
function exportTXT(){downloadBlob(editor.innerText,'note.txt','text/plain');}
function exportMD(){downloadBlob(editor.innerText,'note.md','text/markdown');}
function exportPDF(){
  const win=window.open('','_blank','width=800,height=600');
  win.document.write(`<pre style="font-family:monospace;white-space:pre-wrap;">${editor.innerHTML}</pre>`);
  win.document.close(); win.focus(); win.print();
}
function downloadBlob(text,filename,type){const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();}

// ===== SYNC SCROLL =====
editor.addEventListener('scroll',()=>{lines.scrollTop=editor.scrollTop;});
</script>
</body>
</html>
