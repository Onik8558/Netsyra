<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Let’s Write</title>

<style>
/* Remove ALL focus rings everywhere */    
*:focus,    
*:focus-visible,    
*:focus-within {    
    outline: none !important;    
    box-shadow: none !important;    
}  /* Remove focus border on inputs & textarea */  
input:focus,  
textarea:focus,  
button:focus {  
outline: none !important;  
box-shadow: none !important;  
border: none !important;  
}  
  
/* Remove Chrome/Android blue highlight */  
input,  
textarea,  
button,  
select {  
-webkit-focus-ring-color: transparent;  
}  
  
/* Remove tap highlight on mobile */  
  
* {  
  -webkit-tap-highlight-color: transparent;  
/* ===============================
   Global Reset & Variables
================================ */
:root{
  --bg-main: #f6f7fb;
  --card-bg: #ffffff;
  --text-main: #0f172a;
  --text-muted: #6b7280;
  --divider: rgba(0,0,0,0.08);
  --accent: #6366f1;
  --shadow-soft: 0 20px 45px rgba(15, 23, 42, 0.08);
  --shadow-hover: 0 30px 70px rgba(15, 23, 42, 0.12);
  --radius-xl: 26px;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
               Inter, Roboto, Helvetica, Arial, sans-serif;
}

body{
  background:
    radial-gradient(1200px 600px at 50% -200px, #eef1ff, transparent),
    var(--bg-main);
  color:var(--text-main);
  min-height:100vh;
  overflow-x:hidden;
}

/* ===============================
   Top Bar
================================ */
.top-bar{
  height:72px;
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 28px;
}

.profile-btn{
  width:44px;
  height:44px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.9);
  backdrop-filter: blur(16px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition: transform .25s ease, box-shadow .25s ease;
}

.profile-btn:hover{
  transform: translateY(-2px);
  box-shadow: 0 18px 45px rgba(0,0,0,0.18);
}

.profile-btn svg{
  width:22px;
  height:22px;
  stroke:#111;
}

/* ===============================
   Main Container
================================ */
.container{
  max-width:760px;
  margin:90px auto 0;
  padding:0 26px;
}

/* Title */
.title{
  font-size:38px;
  font-weight:800;
  letter-spacing:-0.6px;
  margin-bottom:46px;
  color:#0b1220;
}

/* ===============================
   Card (Luxury Panel)
================================ */
.card{
  background:
    linear-gradient(180deg, rgba(255,255,255,0.96), #ffffff);
  border-radius: var(--radius-xl);
  padding:14px 22px;
  box-shadow: var(--shadow-soft);
  transition: box-shadow .35s ease, transform .35s ease;
}

.card:hover{
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

/* Options */
.option{
  padding:26px 6px;
  font-size:22px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition: color .25s ease, transform .25s ease;
}

.option span{
  color:var(--text-muted);
  font-weight:500;
  font-size:18px;
}

.option:hover{
  color:var(--accent);
  transform: translateX(4px);
}

/* Divider */
.divider{
  height:1px;
  background: linear-gradient(
    to right,
    transparent,
    var(--divider),
    transparent
  );
  transition: background .25s ease;
}

.option:hover + .divider{
  background: rgba(99,102,241,0.15);
}

/* ===============================
   Mobile polish
================================ */
@media(max-width:520px){
  .title{ font-size:30px; }
  .option{ font-size:20px; padding:22px 4px; }
  .option span{ font-size:16px; }
  .container{ margin-top:70px; }
}

/* Page transition */
.page{
  animation: fadeIn .45s ease forwards;
}

.fade-out{
  animation: fadeOut .35s ease forwards;
}

@keyframes fadeIn{
  from{
    opacity:0;
    transform: translateY(8px);
  }
  to{
    opacity:1;
    transform: translateY(0);
  }
}

@keyframes fadeOut{
  from{
    opacity:1;
    transform: translateY(0);
  }
  to{
    opacity:0;
    transform: translateY(-8px);
  }
}
</style>
</head>

<body>

<!-- Top Right Profile -->
<div class="top-bar">
  <button class="profile-btn" title="Profile">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none"
         viewBox="0 0 24 24" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M5.121 17.804A8.966 8.966 0 0112 15
           c2.21 0 4.21.895 5.879 2.344
           M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
    </svg>
  </button>
</div>

<!-- Main -->
<div class="container page">
  <div class="title">Choose to start</div>

  <div class="card">
    <div class="option" onclick="goTo('/notes')">
      1. Notes <span>Quick thoughts</span>
    </div>
    <div class="divider"></div>

    <div class="option" onclick="goTo('/diary')">
      2. Diary <span>Personal space</span>
    </div>
    <div class="divider"></div>

    <div class="option" onclick="goTo('/ide')">
      3. Strata <span>Your IDE Software</span>
    </div>
  </div>
</div>

<script>
function goTo(route){
  const container = document.querySelector('.page');
  container.classList.add('fade-out');

  setTimeout(()=>{
    window.location.href = route;
  }, 300);
}
</script>

</body>
</html>
