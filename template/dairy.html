<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Diary</title>
<style>
 /* Remove ALL focus rings everywhere */    
*:focus,    
*:focus-visible,    
*:focus-within {    
    outline: none !important;    
    box-shadow: none !important;    
}  /* Remove focus border on inputs & textarea */  
input:focus,  
textarea:focus,  
button:focus {  
outline: none !important;  
box-shadow: none !important;  
border: none !important;  
}  
  
/* Remove Chrome/Android blue highlight */  
input,  
textarea,  
button,  
select {  
-webkit-focus-ring-color: transparent;  
}  
  
/* Remove tap highlight on mobile */  
  
* {  
  -webkit-tap-highlight-color: transparent;  
}  

/* ===== RESET ===== */
body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:-apple-system, BlinkMacSystemFont, Inter, sans-serif;
  overflow-y:auto; /* allow page to scroll if needed */
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.page{
  max-width:700px;
  margin:60px auto 120px;
  padding:28px;
  animation:fadeIn .5s ease;
  overflow:hidden; /* container itself doesn't scroll */
}

/* ===== EDITOR AREA ===== */
#editorArea{
  width:100%;
  min-height:65vh;
  background:rgba(255,255,255,.06);
  color:#fff;
  border-radius:20px;
  padding:24px;
  font-size:18px;
  line-height:1.6;
  outline:none;
  white-space:pre-wrap;
  overflow-y:auto;          /* enable vertical scroll */
  overflow-x:hidden;
  scroll-behavior:smooth;   /* smooth programmatic scroll */
  -webkit-overflow-scrolling: touch; /* momentum scrolling on mobile */
}

/* ===== PROFESSIONAL CUSTOM SCROLLBAR ===== */
#editorArea::-webkit-scrollbar{
  width:12px;
}
#editorArea::-webkit-scrollbar-track{
  background:rgba(255,255,255,0.05);
  border-radius:12px;
}
#editorArea::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:12px;
}
#editorArea::-webkit-scrollbar-thumb:hover{
  background:rgba(255,255,255,0.35);
}

/* ===== LINE NUMBERS (optional) ===== */
#lineNumbers{
  width:40px;
  text-align:right;
  padding-right:10px;
  color:#999;
  user-select:none;
  font-size:16px;
  line-height:1.6;
  float:left;
  margin-right:10px;
}

/* ===== HAMBURGER BUTTON ===== */
.floating-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:48px;
  height:48px;
  border-radius:50%;
  backdrop-filter: blur(16px);
  background: rgba(255,255,255,.35);
  box-shadow:0 8px 20px rgba(0,0,0,.12);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:2000;
  cursor:pointer;
}
.floating-btn svg{width:22px;height:22px;}

/* ===== HAMBURGER MENU ===== */
.menu-popup{
  position:fixed;
  top:76px;
  right:20px;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(16px);
  border-radius:16px;
  box-shadow:0 12px 30px rgba(0,0,0,.15);
  display:none;
  flex-direction:column;
  overflow:hidden;
  z-index:1999;
}
.menu-popup button{
  border:none;
  background:none;
  padding:14px 18px;
  font-size:15px;
  cursor:pointer;
  text-align:left;
  color:#000;
}
.menu-popup button:hover{background: rgba(0,0,0,.06);}

/* ===== BOTTOM CANVA BAR ===== */
.canva-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:64px;
  background:rgba(255,255,255,.95);
  backdrop-filter:blur(16px);
  display:flex;
  gap:10px;
  padding:10px;
  align-items:center;
  box-shadow:0 -8px 20px rgba(0,0,0,.1);
  z-index:1000;
  overflow-x:auto;
  overflow-y:hidden;
  white-space:nowrap;
  -webkit-overflow-scrolling: touch;
}
.canva-bar::-webkit-scrollbar{display:none;}
.canva-bar button,input{flex:0 0 auto;cursor:pointer;border-radius:8px;border:none;padding:6px 10px;font-size:15px;background:#f1f2f6;color:#000;}

/* ===== SELECTED TEXT ===== */
::selection{background:#cce6ff;color:#000;}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(12px);}
  to{opacity:1; transform:none;}
}
</style>
</head>
<body>

<!-- Floating Hamburger -->
<div class="floating-btn" id="menuBtn" title="Menu">
  <svg viewBox="0 0 24 24" fill="black">
    <circle cx="12" cy="5" r="2"/>
    <circle cx="12" cy="12" r="2"/>
    <circle cx="12" cy="19" r="2"/>
  </svg>
</div>

<!-- Hamburger Menu -->
<div class="menu-popup" id="menu">
  <button onclick="saveFile()">💾 Save</button>
  <button onclick="openFile()">📂 Open</button>
  <button onclick="newFile()">🆕 New</button>
</div>

<!-- Editor Container -->
<div class="page">
  <div id="editorArea" contenteditable="true" spellcheck="false" placeholder="Dear diary..."></div>
</div>

<!-- Bottom Canva Bar -->
<div class="canva-bar">
  <button onclick="applyStyle('bold')" title="Bold"><b>B</b></button>
  <button onclick="applyStyle('thin')" title="Thin">T</button>
  <button onclick="align('left')" title="Left">⬅</button>
  <button onclick="align('center')" title="Center">⬍</button>
  <button onclick="align('right')" title="Right">➡</button>
  <input type="number" min="10" max="48" value="18" onchange="applyFontSize(this.value)" title="Font Size">
  <button onclick="exportTXT()">TXT</button>
  <button onclick="exportMD()">MD</button>
  <button onclick="exportPDF()">PDF</button>
  <button onclick="undo()" title="Undo">↩</button>
  <button onclick="redo()" title="Redo">↪</button>
</div>

<script>
// ===== ELEMENTS =====
const editor = document.getElementById('editorArea');
const menuBtn = document.getElementById('menuBtn');
const menu = document.getElementById('menu');

let docs=[{undo:[],redo:[]}], docIndex=0;

// ===== HAMBURGER MENU =====
menuBtn.onclick = e=>{
  menu.style.display = menu.style.display==='flex'?'none':'flex';
  e.stopPropagation();
};
document.addEventListener('click',()=> menu.style.display='none');

// ===== FORMAT FUNCTIONS =====
function align(type){document.execCommand(type==='left'?'justifyLeft':type==='center'?'justifyCenter':'justifyRight');}

function applyStyle(style){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if(style==='bold'){
    document.execCommand('bold');
  } else if(style==='thin'){
    wrapSelectionWithStyle('font-weight','normal');
  }
}

function wrapSelectionWithStyle(property, value){
  const sel = window.getSelection();
  if(!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if(range.collapsed) return;
  const span = document.createElement('span');
  span.style[property] = value;
  range.surroundContents(span);
  sel.removeAllRanges();
  sel.addRange(range);
}

// ===== FILE HANDLERS =====
function saveFile(){
  const text = editor.innerHTML;
  const blob = new Blob([text],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'diary.html';
  a.click();
  menu.style.display='none';
}
function openFile(){
  const input=document.createElement('input');
  input.type='file';
  input.accept='.txt,.html,.md';
  input.onchange=e=>{
    const f=e.target.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=()=>{editor.innerHTML=r.result;}
    r.readAsText(f);
  };
  input.click(); menu.style.display='none';
}
function newFile(){if(editor.innerText.trim() && !confirm('Clear current diary?')) return; editor.innerHTML='';}

// ===== UNDO/REDO =====
editor.addEventListener('input',()=>{docs[docIndex].undo.push(editor.innerHTML); docs[docIndex].redo=[];});
function undo(){const u=docs[docIndex].undo; if(u.length){docs[docIndex].redo.push(editor.innerHTML); editor.innerHTML=u.pop();}}
function redo(){const r=docs[docIndex].redo; if(r.length){docs[docIndex].undo.push(editor.innerHTML); editor.innerHTML=r.pop();}}

// ===== EXPORT =====
function exportTXT(){downloadBlob(editor.innerText,'diary.txt','text/plain');}
function exportMD(){downloadBlob(editor.innerText,'diary.md','text/markdown');}
function exportPDF(){
  const win=window.open('','_blank','width=800,height=600');
  win.document.write(`<pre style="font-family:monospace;white-space:pre-wrap;">${editor.innerHTML}</pre>`);
  win.document.close(); win.focus(); win.print();
}
function downloadBlob(text,filename,type){const blob=new Blob([text],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click();}
</script>
</body>
</html>
