<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage - Netsyra</title>

  <style>
    /* ================= GLOBAL RESET ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;

      outline: none !important;
      box-shadow: none !important;
    }

    *:focus,
    *:focus-visible,
    *:active {
      outline: none !important;
      box-shadow: none !important;
    }

    a, button {
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: linear-gradient(to bottom, #a8edea 0%, #fefcea 50%, #f6b1a5 100%);
      background-size: 400% 400%;
      animation: pastelFlow 25s ease infinite;
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    @keyframes pastelFlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ================= TOP BAR ================= */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: clamp(8px, 2vw, 18px);
      position: relative;
    }

    /* ================= SETTINGS BUTTON ================= */
    .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-btn svg {
      width: clamp(32px, 5vw, 48px);
      height: auto;
      transition: transform 0.6s ease;
      stroke: #333;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .settings-btn.active svg {
      transform: rotate(720deg);
    }

    /* ================= EMIT BARS ================= */
    .emit-bar-vertical,
    .emit-bar-horizontal {
      position: absolute;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: rgba(255, 255, 255, 0.65);
      border: 2px solid #333;
      border-radius: 15px;
      opacity: 0;
      transition: opacity 0.5s ease, height 0.5s ease, width 0.5s ease;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .emit-bar-vertical {
      flex-direction: column;
      left: 6px;
      top: 67px;
      width: 52px;
      height: 0;
    }

    .emit-bar-horizontal {
      flex-direction: row;
      left: 67px;
      top: 6px;
      height: 52px;
      width: 0;
    }

    .settings-btn.active ~ .emit-bar-vertical {
      opacity: 1;
      height: 180px;
    }

    .settings-btn.active ~ .emit-bar-horizontal {
      opacity: 1;
      width: 180px;
    }

    /* ================= CIRCLES ================= */
    .circle {
      background: #fff;
      border: 2px solid #333;
      color: #333;
      font-weight: bold;
      font-size: clamp(14px, 2vw, 18px);
      border-radius: 50%;
      width: clamp(30px, 4vw, 46px);
      height: clamp(30px, 4vw, 46px);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 3px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .circle:active {
      transform: scale(0.9);
    }

    .login-btn {
      background: none;
      border: none;
      font-size: clamp(16px, 2vw, 20px);
      font-weight: bold;
      color: #2b2b2b;
      cursor: pointer;
    }

    /* ================= CENTER TEXT ================= */
    .center-text {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 900;
      font-size: clamp(52px, 12vw, 140px);
      color: #1f1f1f;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.15);
      letter-spacing: clamp(2px, 0.6vw, 6px);
    }

    /* ================= LOWER ================= */
    .lower {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: clamp(40px, 8vh, 120px);
      text-align: center;
    }

    .start-btn {
      background: linear-gradient(135deg, #28a745, #4cd964);
      color: #fff;
      border: none;
      border-radius: 30px;
      padding: clamp(16px, 3vw, 26px) clamp(70px, 12vw, 180px);
      font-size: clamp(18px, 3vw, 26px);
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      transition: transform 0.25s ease, opacity 0.3s ease;
    }

    @media (hover: hover) and (pointer: fine) {
      .start-btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
      }
    }

    .description {
      font-size: clamp(15px, 2.5vw, 18px);
      color: #2a2a2a;
      max-width: 620px;
      line-height: 1.5;
    }

    /* ================= BOTTOM BAR ================= */
    .bottom-bar {
      width: 100%;
      padding: clamp(12px, 2vw, 22px);
      display: flex;
      gap: clamp(10px, 2vw, 20px);
      align-items: center;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .text-input {
      flex: 1;
      padding: clamp(14px, 2vw, 20px);
      font-size: clamp(16px, 2.5vw, 20px);
      border-radius: 16px;
      border: 2px solid #ccc;
      background: rgba(255,255,255,0.9);
    }

    .send-btn {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn svg {
      width: clamp(34px, 5vw, 44px);
      height: auto;
      transition: transform 0.3s ease;
      stroke: #333;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .send-btn:active svg {
      transform: scale(0.9);
    }

    /* ================= PAGE TRANSITION ================= */
    .fade-out {
      opacity: 0;
      transform: scale(1.08);
      transition: all 0.8s ease;
    }

    /* ================= MOBILE RULES ================= */
    @media (max-width: 768px) {
      html, body {
        touch-action: manipulation;
      }

      input, textarea, button {
        font-size: 16px;
      }
    }
  </style>
</head>


<body>

  <div class="top-bar">
    <button class="settings-btn" id="settingsBtn" aria-label="Settings">
  <svg class="settings-icon"
       viewBox="0 0 24 24"
       xmlns="http://www.w3.org/2000/svg"
       fill="none"
       stroke="#333"
       stroke-width="2"
       stroke-linecap="round"
       stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"></circle>
    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
             1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09
             a1.65 1.65 0 0 0-1-1.51
             1.65 1.65 0 0 0-1.82.33l-.06.06
             a2 2 0 1 1-2.83-2.83l.06-.06
             a1.65 1.65 0 0 0 .33-1.82
             1.65 1.65 0 0 0-1.51-1H3
             a2 2 0 1 1 0-4h.09
             a1.65 1.65 0 0 0 1.51-1
             1.65 1.65 0 0 0-.33-1.82l-.06-.06
             a2 2 0 1 1 2.83-2.83l.06.06
             a1.65 1.65 0 0 0 1.82.33H9
             a1.65 1.65 0 0 0 1-1.51V3
             a2 2 0 1 1 4 0v.09
             a1.65 1.65 0 0 0 1 1.51
             1.65 1.65 0 0 0 1.82-.33l.06-.06
             a2 2 0 1 1 2.83 2.83l-.06.06
             a1.65 1.65 0 0 0-.33 1.82V9
             a1.65 1.65 0 0 0 1.51 1H21
             a2 2 0 1 1 0 4h-.09
             a1.65 1.65 0 0 0-1.51 1z"/>
  </svg>
</button>
    <div class="emit-bar-vertical">
      <div class="circle" onclick="goPage('vocabulary')">V</div>
      <div class="circle" onclick="goPage('grammar')">G</div>
      <div class="circle" onclick="goPage('listening')">L</div>
    </div>

    <div class="emit-bar-horizontal">
      <div class="circle" onclick="goPage('speaking')">S</div>
      <div class="circle" onclick="goPage('exercise')">E</div>
      <div class="circle" onclick="goPage('notes')">N</div>
    </div>

    <button class="login-btn">Login</button>
  </div>

  <div class="center-text">N 1</div>

  <div class="lower">
    <button class="start-btn" onclick="window.location.href='{{ url_for('languages') }}'">
      Start
    </button>
    <p class="description">
      Hey there, to take lesson press on start, otherwise choose another task from setting.
    </p>
  </div>

  <div class="bottom-bar">
    <input type="text" class="text-input" placeholder="Type something..." id="chatBar">
<button class="send-btn">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M2 21L23 12L2 3L2 10L17 12L2 14L2 21Z" 
          stroke="#333" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>
</button>
  </div>

  <script>
    const settingsBtn = document.getElementById('settingsBtn');
    settingsBtn.addEventListener('click', () => {
      settingsBtn.classList.toggle('active');
    });

    const chatBar = document.getElementById('chatBar');
    chatBar.addEventListener('focus', () => {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = "{{ url_for('chatbot') }}";
      }, 800);
    });

    function goPage(type) {
      window.location.href = `/settings/${type}`;
    }
  </script>

</body>
  </html>
