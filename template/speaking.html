<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Speaking</title>

<style>
/* ========= RESET ========= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}
:focus{outline:none}

/* ========= ROOT ========= */
:root{
  --border-height:180px;
  --blue:#1a73e8;
}

/* ========= BODY ========= */
body{
  font-family:"Google Sans","Inter",system-ui,sans-serif;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* ========= GEMINI LIVE GLOW ========= */
.gemini-glow{
  position:fixed;
  bottom:-40px;
  left:0;
  width:100%;
  height:300px;
  background:
    radial-gradient(circle at 50% 85%,
      rgba(66,133,244,.9),
      rgba(66,133,244,.35),
      transparent 70%);
  filter:blur(22px);
  opacity:.85;
  pointer-events:none;
  z-index:1;
  animation: glowMove 6s ease-in-out infinite;
}
@keyframes glowMove{
  0%{transform:translateX(-6%)}
  50%{transform:translateX(6%)}
  100%{transform:translateX(-6%)}
}

/* ========= AI THINKING / TYPING ========= */
.bubble.thinking {
  max-width: 40%;
  padding: 14px 18px;
  border-radius: 18px;
  background: rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.15);
  color: #aaa;
  font-size: 15px;
  display: flex;
  gap: 6px;
  align-items: center;
  animation: fade .2s ease;
}

.thinking span {
  width: 8px;
  height: 8px;
  background: #8ab4f8;
  border-radius: 50%;
  display: inline-block;
  animation: dotBounce 1.4s infinite ease-in-out;
}

.thinking span:nth-child(1) { animation-delay: 0s; }
.thinking span:nth-child(2) { animation-delay: 0.2s; }
.thinking span:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* ========= TOP / BOTTOM ========= */
.top-border,
.bottom-border{
  position:fixed;
  left:0;
  width:100%;
  height:var(--border-height);
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.12);
  z-index:20;
}
.top-border{
  top:0;
  height:90px;
  border-radius:0 0 28px 28px;
}
.bottom-border{
  bottom:0;
  border-radius:28px 28px 0 0;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ========= CHAT ========= */
.chat-area{
  position:absolute;
  top:90px;
  bottom:180px;
  left:0;
  right:0;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
  overflow-y:auto;
  scroll-behavior:smooth;
  z-index:10;
}

/* ========= BUBBLES ========= */
.bubble{
  max-width:78%;
  padding:14px 18px;
  border-radius:18px;
  font-size:15px;
  line-height:1.45;
  animation:fade .2s ease;
}
.bubble.user{
  margin-left:auto;
  background:#e8f0fe;
  color:#174ea6;
  border-bottom-right-radius:6px;
}
.bubble.bot{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
  color:#fff;
  border-bottom-left-radius:6px;
}
@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:none}
}

/* ========= MIC ========= */
.mic-btn{
  width:130px;
  height:130px;
  border-radius:50%;
  border:none;
  background:var(--blue);
  color:#fff;
  font-size:46px;
  position:relative;
}
.mic-btn.listening{
  animation:pulse 1.3s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(66,133,244,.4)}
  100%{box-shadow:0 0 0 30px rgba(66,133,244,0)}
}

/* ========= AI SPEAKING WAVE ========= */
.ai-wave{
  display:flex;
  gap:4px;
  height:26px;
  margin-top:6px;
}
.ai-wave span{
  width:5px;
  height:6px;
  background:#8ab4f8;
  border-radius:6px;
  animation:aiWave 1s infinite ease-in-out;
}
.ai-wave span:nth-child(2){animation-delay:.1s}
.ai-wave span:nth-child(3){animation-delay:.2s}
.ai-wave span:nth-child(4){animation-delay:.3s}
.ai-wave span:nth-child(5){animation-delay:.4s}

@keyframes aiWave{
  0%,100%{height:6px;opacity:.4}
  50%{height:26px;opacity:1}
}
</style>
</head>

<body>

<div class="gemini-glow"></div>
<div class="top-border"></div>
<div class="chat-area" id="chat"></div>

<div class="bottom-border">
  <button class="mic-btn" id="micBtn">🎤</button>
</div>

<script>
/* ========= DEVICE ========= */
if (navigator.userAgent.toLowerCase().includes("android")) {
  document.documentElement.style.setProperty("--border-height", "200px");
}

/* ========= DOM ========= */
const chat = document.getElementById("chat");
const micBtn = document.getElementById("micBtn");

/* ========= MEMORY ========= */
let conversation = [];
const MAX_MEMORY = 20;

/* ========= SPEECH RECOGNITION ========= */
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const recognition = SpeechRecognition ? new SpeechRecognition() : null;

if (recognition) {
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.trim();
    if (transcript) {
      addBubble(transcript, "user");
      respond(transcript);
    }
  };

  recognition.onerror = (e) => {
    console.error("Speech recognition error:", e);
    micBtn.classList.remove("listening");
  };

  recognition.onend = () => {
    micBtn.classList.remove("listening");
  };
}

/* ========= MIC BUTTON ========= */
micBtn.addEventListener("click", () => {
  if (!recognition) return;
  micBtn.classList.add("listening");
  recognition.start();
});

/* ========= UI ========= */
function addBubble(text, type) {
  const div = document.createElement("div");
  div.className = "bubble " + type;

  text = text.replace(/\*+/g, "").trim();

  const lines = text.split("\n").map(l => l.trim()).filter(Boolean);

  let important = "";
  let mainText = "";
  let bullets = [];
  let closing = ""; // <-- start empty

  lines.forEach(line => {
    if (/^(important|note|key point|remember):/i.test(line)) {
      important = line.replace(/^(important|note|key point|remember):/i, "").trim();
      return;
    }
    if (/^[-•]/.test(line)) {
      bullets.push(line.replace(/^[-•]\s*/, ""));
      return;
    }
    if (!mainText) mainText = line;
    else mainText += " " + line;
  });

  // Only show closing if AI is unsure
  if (mainText === "I am not sure.") {
    closing = "Would you like me to explain anything further? 🙂";
  }

  let html = "";
  if (important) html += `<div style="font-weight:900;font-size:20px;margin-bottom:8px;">⚠️ ${important}</div>`;
  if (mainText) html += `<div style="margin-bottom:10px;">${mainText}</div>`;
  bullets.forEach(b => { html += `<div style="margin-left:16px;">• 🔹 ${b}</div>`; });
  if (closing) html += `<div style="margin-top:10px;opacity:.9;">${closing}</div>`;

  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

/* ========= LANGUAGE DETECTION ========= */
let detectedLang = "en-US";
function detectLanguage(text) {
  if (/[؀-ۿ]/.test(text)) return "ur-PK";
  if (/[а-яА-Я]/.test(text)) return "ru-RU";
  if (/[一-龯]/.test(text)) return "zh-CN";
  if (/[ぁ-ゟ]/.test(text)) return "ja-JP";
  if (/[가-힯]/.test(text)) return "ko-KR";
  return "en-US";
}

/* ========= TEXT TO SPEECH ========= */
function speak(text) {
  if (!speechSynthesis) return;
  speechSynthesis.cancel();

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = detectedLang;
  speechSynthesis.speak(utter);
}

/* ========= AI ========= */
async function respond(userText) {
  micBtn.disabled = true;

  conversation.push({ role: "user", content: userText });
  conversation = conversation.slice(-MAX_MEMORY);

  // Show thinking bubble
  const thinkingBubble = document.createElement("div");
  thinkingBubble.className = "bubble thinking";
  thinkingBubble.innerHTML = "<span></span><span></span><span></span>";
  chat.appendChild(thinkingBubble);
  chat.scrollTop = chat.scrollHeight;

  try {
    detectedLang = detectLanguage(userText);

    const response = await fetch("/ai", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ conversation })
    });

    const data = await response.json();

    // Default reply
    let reply = "I am not sure.";

    if (data?.reply) reply = data.reply;
    else if (data?.error) reply = `Error: ${data.error}`;

    thinkingBubble.remove();

    // Only show the "explain further" line if reply is "I am not sure."
    let closing = reply === "I am not sure." ? "Would you like me to explain anything further? 🙂" : "";

    addBubble(reply, "bot", closing); // pass closing line
    speak(reply);

  } catch (err) {
    console.error("AI error:", err);
    thinkingBubble.remove();
    addBubble("Connection error.", "bot");
  } finally {
    micBtn.disabled = false;
  }
}
</script>

</body>
</html>
