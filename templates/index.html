<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ BASE VIEWPORT (DESKTOP SAFE) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Welcome - Netsyra</title>

  <style>
    /* ================= GLOBAL RESET ================= */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

      /* ❌ Disable selection & callouts */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;

      /* ❌ Remove focus visuals */
      outline: none !important;
      box-shadow: none !important;
    }

    *:focus,
    *:focus-visible,
    *:active {
      outline: none !important;
      box-shadow: none !important;
    }

    a, button {
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      color: #000;
      background: linear-gradient(
        -45deg,
        #fceabb,
        #f8b500,
        #ffdde1,
        #d4fc79,
        #96e6a1,
        #89f7fe,
        #66a6ff,
        #c3cfe2
      );
      background-size: 600% 600%;
      animation: gradientBG 20s ease infinite;
    }

    /* ================= ANIMATION ================= */
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      25% { background-position: 50% 100%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 50% 0%; }
      100% { background-position: 0% 50%; }
    }

    /* ================= LAYOUT ================= */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .welcome {
      font-weight: 700;
      font-size: clamp(32px, 8vw, 72px);
      line-height: 1.2;
      animation: fadeIn 2s ease-out forwards;
    }

    .n1 {
      display: block;
      margin-top: 10px;
      font-weight: 700;
      font-size: clamp(26px, 6vw, 50px);
      animation: fadeIn 2.5s ease-out forwards;
    }

    .continue-btn {
      position: fixed;
      left: 50%;
      bottom: 40px;
      transform: translateX(-50%);
      width: 50%;
      max-width: 280px;
      padding: 12px 0;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      text-decoration: none;
      border-radius: 999px;
      background: #1e90ff;
      color: #fff;
      border: none;
      opacity: 0;
      animation: slideUp 1.5s ease-out forwards;
      animation-delay: 2s;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
    }

    /* Hover only meaningful on non-touch */
    @media (hover: hover) and (pointer: fine) {
      .continue-btn:hover {
        transform: translateX(-50%) scale(1.05);
        box-shadow: 0 8px 20px rgba(0,0,0,0.25);
      }
    }

    /* ================= KEYFRAMES ================= */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translate(-50%, 40px); }
      to   { opacity: 1; transform: translate(-50%, 0); }
    }

    /* ================= MOBILE / SMALL DEVICES ================= */
    @media (max-width: 768px) {

      /* 🚫 Disable zoom gestures */
      html, body {
        touch-action: manipulation;
      }

      input, textarea, button {
        font-size: 16px; /* Prevents iOS zoom */
      }
    }
  </style>
</head>

<body>

  <div class="center">
    <div class="welcome">
      Welcome to Netsyra
      <span class="n1">N 1</span>
    </div>
  </div>

  <a class="continue-btn" href="{{ url_for('homepage') }}">
    Continue
  </a>

</body>
